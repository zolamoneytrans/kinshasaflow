workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.kinshasaflow.online"
      groups:
        - app_store_credentials
    integrations:
      app_store_connect: "app_store"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set Bundle ID
        script: |
          # S'assurer que le Bundle ID du projet correspond bien à celui d'Apple
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" ios/App/App.xcodeproj/project.pbxproj
      - name: Fetch signing files and build
        script: |
          # 1. Récupérer ou créer les certificats/profils depuis Apple (Signature Automatique)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 2. Initialiser le trousseau pour stocker les certificats récupérés
          keychain initialize
          
          # 3. Appliquer les profils au projet Xcode
          xcode-project use-profiles
          
          # 4. Construire l'IPA final avec destination explicite
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination generic/platform=iOS"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true