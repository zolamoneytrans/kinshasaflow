workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.kinshasaflow.online"
      groups:
        - app_store_credentials
    integrations:
      app_store_connect: "app_store"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Configure Project Signing
        script: |
          # 1. Force le mode de signature manuel
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/App/App.xcodeproj/project.pbxproj
          
          # 2. Force le Bundle ID pour correspondre à celui d'Apple
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" ios/App/App.xcodeproj/project.pbxproj
      - name: Build and Sign IPA
        script: |
          # 1. Initialisation du trousseau de clés
          keychain initialize
          
          # 2. Importation des certificats (doivent être dans les variables CM_CERTIFICATE)
          keychain add-certificates
          
          # 3. Récupération des profils depuis Apple (avec création automatique si manquant)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 4. Application des profils au projet
          xcode-project use-profiles
          
          # 5. Build final
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
