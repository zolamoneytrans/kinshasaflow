workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.kinshasaflow.online"
    integrations:
      app_store_connect: "app_store"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Disable Automatic Signing
        script: |
          # Force Xcode à utiliser le mode manuel pour éviter les erreurs de profil
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/App/App.xcodeproj/project.pbxproj
      - name: Build and Sign IPA
        script: |
          # 1. Préparation du trousseau
          keychain initialize
          
          # 2. Récupération forcée des certificats uploadés dans Codemagic
          # Note: Assurez-vous que le .p12 est bien dans le groupe "app_store_credentials"
          keychain add-certificates
          
          # 3. Récupération des profils de provisionnement depuis Apple
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 4. Debug: Lister ce qui a été trouvé (visible dans les logs)
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # 5. Application des profils au projet
          xcode-project use-profiles
          
          # 6. Build final
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --bundle-id "$BUNDLE_ID"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
