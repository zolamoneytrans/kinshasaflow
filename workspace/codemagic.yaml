workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.kinshasaflow.online"
      groups:
        - app_store_credentials
    integrations:
      app_store_connect: "app_store"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: npm run build
      - name: Capacitor Sync and Assets
        script: |
          npx cap add ios || true
          # Génération des icônes si le dossier assets contient icon.png
          if [ -f "assets/icon.png" ]; then
            npx @capacitor/assets generate --ios
          fi
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set Version and Build Number
        script: |
          VERSION=$(node -p "require('./package.json').version")
          # Mise à jour de la version marketing (ex: 2.2.2)
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          # Mise à jour du numéro de build (incrémental via Codemagic)
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" ios/App/App.xcodeproj/project.pbxproj
      - name: Set Bundle ID
        script: |
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" ios/App/App.xcodeproj/project.pbxproj
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true