workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.kinshasaflow.online"
    integrations:
      app_store_connect: "app_store"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Disable Automatic Signing
        script: |
          # Force Xcode à utiliser le mode manuel pour que Codemagic puisse injecter les profils
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/App/App.xcodeproj/project.pbxproj
      - name: Build and Sign IPA
        script: |
          # 1. Initialisation du trousseau sur la machine de build
          keychain initialize
          
          # 2. Importation du certificat .p12 (uploadé dans l'interface Codemagic)
          keychain add-certificates
          
          # 3. Récupération ET création des profils de provisionnement depuis Apple
          # L'argument --create permet à Codemagic de générer le profil s'il n'existe pas encore sur votre portail Apple
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 4. Configuration automatique du projet Xcode pour utiliser les fichiers téléchargés
          xcode-project use-profiles
          
          # 5. Construction de l'IPA final pour l'App Store
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
