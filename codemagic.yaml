workflows:
  ios-workflow:
    name: Kinshasa Flow iOS Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      groups:
        - app_store_credentials # Groupe de variables à créer dans l'UI Codemagic
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "online.kinshasaflow.app"
    integrations:
      app_store_connect: "App Store Connect" # Doit correspondre au nom de votre intégration dans Codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Next.js Build (Web Assets)
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build and Sign IPA
        script: |
          # Récupération automatique des certificats via l'API Apple
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-type ios_app --auth
          xcode-project use-profiles
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration # Utilise l'intégration configurée dans l'UI Codemagic
        submit_to_testflight: true # Envoie automatiquement le build vers TestFlight
        expire_build_after_days: 90
